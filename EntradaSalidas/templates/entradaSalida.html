<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game'sBar Admin 🎮</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f9fc;
        color: #111;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      .sidebar {
        width: 240px;
        background: linear-gradient(180deg, #0000ff, #00c2b8);
        color: white;
        display: flex;
        flex-direction: column;
        padding-top: 20px;
      }

      .sidebar h2 {
        font-family: "Arial Black", Arial, sans-serif;
        font-size: 1.7rem;
        text-align: center;
        margin-bottom: 30px;
        user-select: none;
      }

      .nav-item {
        padding: 15px 25px;
        cursor: pointer;
        display: flex;
        align-items: center;
        font-weight: 600;
        font-size: 0.95rem;
        transition: background 0.3s ease;
      }

      .nav-item:hover,
      .nav-item.active {
        background: #00b7a8;
      }

      .main-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      header {
        background: linear-gradient(90deg, #0000ff, #00c2b8);
        padding: 18px 30px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
        font-size: 1.25rem;
      }

      header .user-info {
        font-size: 0.95rem;
      }

      section {
        padding: 30px;
        overflow-y: auto;
        flex-grow: 1;
      }

      h2 {
        color: #f8f8f8;
        margin-bottom: 20px;
      }

      .card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <nav class="sidebar">
      <h2>Game'sBar</h2>

      <div class="nav-item active" onclick="location.href = '#'">
        Entradas y Salidas
      </div>

      <div class="nav-item" onclick="location.href = '#'">Proveedor</div>

      <div class="nav-item" onclick="location.href = '#'">Producto</div>

      <div class="nav-item" onclick="location.href = '#'">Reporte</div>

      <div class="nav-item" onclick="location.href = '#'">Usuarios</div>

      <div class="nav-item" onclick="location.href = '#'">
        Solicitud de Productos
      </div>

      <div class="nav-item" onclick="location.href = '#'">Sucursal</div>
    </nav>

    <div class="main-content">
      <header>
        Game'sBar 🎮 - Administración
        <div class="user-info">Hola, Admin</div>
      </header>

      <section>
        <h2>Entradas y Salidas</h2>

        <div class="card">
          <p>
            Aquí irá el contenido correspondiente al módulo seleccionado. Puedes
            colocar tablas, formularios o reportes dependiendo de la opción.
          </p>
        </div>
      </section>
    </div>
  </body>
</html>
